name: Visual Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/components/**'
      - 'src/app/**'
      - '**/globals.css'
  workflow_dispatch:

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-tests:
    name: Playwright visual regression tests
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: playwright-placeholder-secret-that-is-long-enough
      NEXTAUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      GITHUB_ID: playwright-github-id
      GITHUB_SECRET: playwright-github-secret
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright visual tests
        run: npx playwright test e2e/visual.spec.ts --update-snapshots

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7
