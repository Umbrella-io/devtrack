```yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel outdated runs on the same PR/branch to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type check ──────────────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tsc
        run: pnpm type-check

  # ── 2. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  # ── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    env:
      NEXTAUTH_SECRET: ci-placeholder-secret-that-is-long-enough-32c
      NEXTAUTH_URL: http://localhost:3000
      GITHUB_ID: ci-placeholder
      GITHUB_SECRET: ci-placeholder
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build

  # ── 4. Dependency audit ────────────────────────────────────────────────────
  dep-check:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check all imports exist in package.json
        run: node scripts/check-deps.js

  # ── Summary gate ───────────────────────────────────────────────────────────
  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build, dep-check]
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.lint.result }}"      != "success" ||
                "${{ needs.build.result }}"     != "success" ||
                "${{ needs.dep-check.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi

          echo "All CI jobs passed."
```
